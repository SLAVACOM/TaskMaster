server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyForDockerEnvironment}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**

        - id: organization-service
          uri: ${ORG_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/organizations/**

        - id: task-service
          uri: ${TASK_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/tasks/**

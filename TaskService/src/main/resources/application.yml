spring:
  application:
    name: TaskService

  # Distributed Tracing with Sleuth + Zipkin
  zipkin:
    base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}
    sender:
      type: web
  sleuth:
    sampler:
      probability: ${SLEUTH_SAMPLING_RATE:1.0}
    trace-id128: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://task-db:5432/task_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml


server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.slavacom.taskservice: DEBUG
    org.springframework.cloud.sleuth: DEBUG

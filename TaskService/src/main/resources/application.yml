spring:
  application:
    name: TaskService

  datasource:
    url: ${DB_URL:jdbc:postgresql://task-db:5432/task_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


server:
  port: ${SERVER_PORT:8080}

server:
  port: ${SERVICE_PORT:8080}

spring:
    application:
        name: S3StorageService

    redis:
        host: ${REDIS_HOST:localhost}
        port: ${REDIS_PORT:6379}
        password: ${REDIS_PASSWORD:}


s3:
  login: ${S3_ACCESS_KEY:YOUR_ACCESS_KEY_ID}
  password: ${S3_SECRET_ACCESS_KEY:YOUR_SECRET_ACCESS_KEY}
  endpoint: ${S3_ENDPOINT:YOUR_SECRET_ACCESS_KEY}
  bucket: ${S3_BUCKET:your-bucket-name}
  tenant: ${S3_TENANT:your-tenant-id}
  region: ${S3_REGION:ru-central-1}

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_RATE:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    root: INFO
    com.slavacom.s3storageservice: DEBUG
    io.micrometer.tracing: DEBUG
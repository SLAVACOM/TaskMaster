spring:
    application:
        name: OrganizationService

    # Distributed Tracing with Sleuth + Zipkin
    zipkin:
      base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}
      sender:
        type: web
    sleuth:
      sampler:
        probability: ${SLEUTH_SAMPLING_RATE:1.0}
      trace-id128: true

    datasource:
        url: ${DB_URL:jdbc:postgresql://localhost:5432/organization_db}
        username: ${DB_USERNAME:postgres}
        password: ${DB_PASSWORD:postgres}
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.PostgreSQLDialect

services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8092}
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8091}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.slavacom.organizationservice: DEBUG
    org.springframework.cloud.sleuth: DEBUG
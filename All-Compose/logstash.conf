input {
  # TCP input for JSON logs from microservices via logstash-logback-encoder
  tcp {
    port => 5000
    codec => json
    type => "logstash"
  }

  # UDP input as fallback (optional, for improved reliability)
  udp {
    port => 5001
    codec => json
    type => "logstash"
  }
}

filter {
  # Parse JSON logs from services
  if [@metadata][docker][container][image][tag] {
    mutate {
      add_field => { "service" => "%{[@metadata][docker][container][image][tag]}" }
    }
  }

  # Extract trace and span IDs from message if present
  if [message] =~ /traceId=/ {
    grok {
      match => { "message" => "\[traceId=%{DATA:traceId},spanId=%{DATA:spanId}\]" }
      tag_on_failure => []
    }
  }

  # Ensure timestamp is properly formatted
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
  }
}
